name: Deploy to GCS Stage

on:
  push:
    branches:
      - master

permissions: {}

jobs:
  test-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Test current build
        run: npm run test-ci
        continue-on-error: true

  deploy-stage:
    runs-on: ubuntu-latest
    needs: test-website
    if: ${{ success() }}
    environment: stage
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0

      - name: Set up Google Cloud SDK
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Build the website
        run: |
          npm ci
          npm run build:production

      - name: Build version.json file
        run: |
          if [ -e version.json ]; then
            echo "version.json exists, skipping build"
          else
            echo "version.json does not exist, running build-version-json.sh"
            bash  ./.utils/build-version-json.sh
          fi

      - name: Deploy the website to stage
        run: |
          sh ./.utils/gcs-deploy.sh  ${VARS_EXTENSIONWORKSHOP_BUCKET_STAGE}
        env:
          VARS_EXTENSIONWORKSHOP_BUCKET_STAGE: ${{ vars.EXTENSIONWORKSHOP_BUCKET_STAGE }}
